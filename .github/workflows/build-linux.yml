name: Build Linux (Production)

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build and Package DEB (Release)
      run: ./gradlew packageReleaseDeb

    - name: Upload DEB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: discord-rpc-gui-linux-deb
        path: build/compose/binaries/main/deb/*.deb
        retention-days: 7
