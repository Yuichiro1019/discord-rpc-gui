name: Build Linux (Production)

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Install Packaging Dependencies
      run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg-dev

    - name: Build and Package DEB (Release)
      run: ./gradlew packageReleaseDeb

    - name: Upload DEB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: discord-rpc-gui-linux-deb
        path: build/compose/binaries/main/**/*.deb
        retention-days: 7
