name: Build Linux (Production)

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Install Packaging Dependencies
      run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg-dev rpm

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies and compile sidecar
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pypresence
        pyinstaller --onefile src/desktopMain/resources/pypresence_sidecar.py --distpath src/desktopMain/resources/bin/linux --name pypresence_sidecar

    - name: Build and Package DEB (Release)
      run: ./gradlew packageReleaseDeb

    - name: Build and Package RPM (Release)
      run: ./gradlew packageReleaseRpm

    - name: Upload DEB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: discord-rpc-gui-linux-deb
        path: build/**/*.deb
        retention-days: 7

    - name: Upload RPM Artifact
      uses: actions/upload-artifact@v4
      with:
        name: discord-rpc-gui-linux-rpm
        path: build/**/*.rpm
        retention-days: 7
