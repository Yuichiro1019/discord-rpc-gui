name: Build Windows (Production)

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Build Windows Installers (Release)
      shell: bash
      run: bash ./gradlew packageReleaseMsi packageReleaseExe --no-daemon --stacktrace

    - name: Debug - Find all EXE and MSI files
      if: always()
      run: |
        echo "Searching for generated installers..."
        $files = Get-ChildItem -Path . -Include *.exe,*.msi -Recurse
        if ($files) {
          $files | Select-Object FullName, Length
        } else {
          Write-Host "No EXE or MSI files were generated."
        }
      shell: pwsh

    - name: Upload MSI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: discord-rpc-gui-windows-msi
        path: |
          build/compose/binaries/main-release/msi/*.msi
          build/compose/binaries/main/msi/*.msi
        if-no-files-found: error
        retention-days: 7

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: discord-rpc-gui-windows-exe
        path: |
          build/compose/binaries/main-release/exe/*.exe
          build/compose/binaries/main/exe/*.exe
        if-no-files-found: error
        retention-days: 7
