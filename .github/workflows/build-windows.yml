name: Build Windows (Production)

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build and Package MSI (Release)
      run: ./gradlew packageReleaseMsi
      
    - name: Build and Package EXE (Release)
      run: ./gradlew packageReleaseExe

    - name: Upload MSI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: discord-rpc-gui-windows-msi
        path: build\compose\binaries\main\msi\*.msi
        retention-days: 7

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: discord-rpc-gui-windows-exe
        path: build\compose\binaries\main\exe\*.exe
        retention-days: 7
